<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Muzyczne Radio PRO</title>
</head>
<body style="margin:0; background:#000; height:100vh; overflow:hidden; font-family:Arial,sans-serif; display:flex; align-items:center; justify-content:center; padding:10px; box-sizing:border-box;">

<div style="width:100%; max-width:900px; max-height:calc(100vh - 20px); background:#1a1a1a; border:4px solid #ff2a2a; border-radius:12px; box-shadow:0 0 40px rgba(255,42,0.5); box-sizing:border-box; display:flex; flex-direction:column;">

  <div style="background:#0a0a0a; flex:1; margin:8px; border-radius:8px; border:1px solid #333; padding:12px; display:flex; flex-direction:column; box-shadow:inset 0 0 25px #000; overflow:hidden;">

    <div style="width:fit-content; margin:0 auto; display:flex; flex-direction:column; align-items:center;">

      <div style="color:#ff2a2a; font-size:clamp(28px,6vw,52px); text-align:center; margin-bottom:8px; text-shadow:0 0 10px #ff0000, 0 0 20px #ff0000; font-weight:bold; letter-spacing:3px; flex-shrink:0; white-space:nowrap;">
        RMF FM
      </div>

      <div id="scale" style="width:100%; height:45px; min-height:45px; max-height:45px; background:#1a0505; border:2px solid #ff2a2a; border-radius:4px; margin-bottom:8px; position:relative; flex-shrink:0; box-sizing:border-box;">
        <div style="position:absolute; width:100%; height:100%; background:repeating-linear-gradient(90deg, transparent, transparent 9%, #ff000040 9%, #ff000040 10%);"></div>
        <div style="position:absolute; width:100%; text-align:center; top:50%; transform:translateY(-50%); color:#ff6a3a; font-size:11px; text-shadow:0 0 8px #ff3300; display:flex; justify-content:space-between; padding:0 5%; box-sizing:border-box;">
          <span>88</span><span>92</span><span>96</span><span>100</span><span id="pos104">104</span><span id="pos108">108</span>
        </div>
        <div id="needle" style="position:absolute; top:0px; width:4px; height:42px; background:#ff2a2a; box-shadow:0 0 12px #ff2a2a; transform:translateX(-50%); display:none;"></div>
        <div id="needleLabel" style="position:absolute; bottom:-2px; transform:translateX(-50%); color:#ff2a2a; font-size:10px; font-weight:bold; text-shadow:0 0 8px red; display:none;">105.8 FM</div>
      </div>

      <canvas id="eq" style="width:100%; height:100px; min-height:100px; max-height:100px; background:#000; border:2px solid #ff2a2a; border-radius:6px; display:block; margin-bottom:10px; flex-shrink:0;"></canvas>

    </div>

    <div style="display:flex; align-items:flex-start; justify-content:space-between; flex:1; min-height:0; padding:0 1.5cm; padding-bottom:1.5cm; position:relative;">

      <div style="width:clamp(90px,18vw,130px); height:clamp(90px,18vw,130px); background:radial-gradient(circle, #050505 0%, #111 40%, #050505 70%); border-radius:50%; border:3px solid #ff2a2a; box-shadow:inset 0 0 25px #000, 0 0 15px rgba(255,0,0,0.3); flex-shrink:0;"></div>

      <div style="display:flex; flex-direction:column; align-items:center; height:clamp(90px,18vw,130px); justify-content:space-between;">
        <div style="display:flex; gap:10px; align-items:center; justify-content:center;">

          <button id="playBtn" style="width:clamp(50px,11vw,65px); height:clamp(50px,11vw,65px); border-radius:50%; background:radial-gradient(circle at 30% 30%, #3a3a3a, #1a1a1a); border:3px solid #ff2a2a; color:#ddd; cursor:pointer; box-shadow:0 0 15px rgba(255,42,42,0.5); font-size:8px; font-weight:bold; position:relative;">
            <div style="position:absolute; top:5px; left:50%; transform:translateX(-50%); width:3px; height:9px; background:#ff2a2a; border-radius:2px; box-shadow:0 0 8px #ff2a2a;"></div>
            ON
          </button>

          <button id="stopBtn" style="width:clamp(50px,11vw,65px); height:clamp(50px,11vw,65px); border-radius:50%; background:radial-gradient(circle at 30% 30%, #3a3a3a, #1a1a1a); border:3px solid #ff2a2a; color:#ddd; cursor:pointer; box-shadow:0 0 15px rgba(255,42,42,0.5); font-size:8px; font-weight:bold; position:relative;">
            <div style="position:absolute; top:5px; left:50%; transform:translateX(-50%); width:3px; height:9px; background:#ff2a2a; border-radius:2px; box-shadow:0 0 8px #ff2a2a;"></div>
            OFF
          </button>

          <button id="muteBtn" style="width:clamp(50px,11vw,65px); height:clamp(50px,11vw,65px); border-radius:50%; background:radial-gradient(circle at 30% 30%, #3a3a3a, #1a1a1a); border:3px solid #ff2a2a; color:#ddd; cursor:pointer; box-shadow:0 0 15px rgba(255,42,42,0.5); font-size:8px; font-weight:bold; position:relative;">
            <div style="position:absolute; top:5px; left:50%; transform:translateX(-50%); width:3px; height:9px; background:#ff2a2a; border-radius:2px; box-shadow:0 0 8px #ff2a2a;"></div>
            MUTE
          </button>

          <div id="volKnob" style="width:clamp(50px,11vw,65px); height:clamp(50px,11vw,65px); border-radius:50%; background:radial-gradient(circle at 30% 30%, #3a3a3a, #1a1a1a); border:3px solid #ff2a2a; color:#ddd; cursor:pointer; box-shadow:0 0 15px rgba(255,42,42,0.5); font-size:8px; font-weight:bold; position:relative; display:flex; align-items:center; justify-content:center; user-select:none; touch-action:none;">
            <div id="volIndicator" style="position:absolute; top:5px; left:50%; width:3px; height:11px; background:#ff2a2a; border-radius:2px; box-shadow:0 0 8px #ff2a2a; transform-origin:50% 24px; transform:translateX(-50%) rotate(0deg);"></div>
            VOL
          </div>

        </div>
        <a href="https://www.muzyczneradio.pl" target="_blank" style="color:#ff2a2a; text-decoration:none; text-shadow:0 0 6px red; font-size:14px;">www.muzyczneradio.pl</a>
      </div>

      <div style="width:clamp(90px,18vw,130px); height:clamp(90px,18vw,130px); background:radial-gradient(circle, #050505 0%, #111 40%, #050505 70%); border-radius:50%; border:3px solid #ff2a2a; box-shadow:inset 0 0 25px #000, 0 0 15px rgba(255,0,0,0.3); flex-shrink:0;"></div>

    </div>

  </div>
  <!-- Tu umieszczamy 14 przycisków w dwóch rzędach po 7 -->
  <div style="margin-top:10px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center;">
    <button style="width:60px;">Przyc1</button>
    <button style="width:60px;">Przyc2</button>
    <button style="width:60px;">Przyc3</button>
    <button style="width:60px;">Przyc4</button>
    <button style="width:60px;">Przyc5</button>
    <button style="width:60px;">Przyc6</button>
    <button style="width:60px;">Przyc7</button>
    <button style="width:60px;">Przyc8</button>
    <button style="width:60px;">Przyc9</button>
    <button style="width:60px;">Przyc10</button>
    <button style="width:60px;">Przyc11</button>
    <button style="width:60px;">Przyc12</button>
    <button style="width:60px;">Przyc13</button>
    <button style="width:60px;">Przyc14</button>
  </div>
</div>
<!-- Usunięto link do radia -->
<!-- Zmieniono napis na RMF FM (kolor niebieski) -->
<script>
var audio = document.getElementById('audio');
var canvas = document.getElementById('eq');
var ctx = canvas.getContext('2d');
var playBtn = document.getElementById('playBtn');
var stopBtn = document.getElementById('stopBtn');
var muteBtn = document.getElementById('muteBtn');
var volKnob = document.getElementById('volKnob');
var volIndicator = document.getElementById('volIndicator');
var needle = document.getElementById('needle');
var needleLabel = document.getElementById('needleLabel');
var scale = document.getElementById('scale');

audio.volume = 0.5;
var audioCtx, analyser, source, dataArray, anim, analyserEnabled = false;

// 1. USTAWIAM KRESKĘ DOPIERO JAK FONTY SIĘ ZAŁADUJĄ
function setNeedlePosition(){
  var rect104 = document.getElementById('pos104').getBoundingClientRect();
  var rect108 = document.getElementById('pos108').getBoundingClientRect();
  var scaleRect = scale.getBoundingClientRect();

  var start = rect104.left + rect104.width/2 - scaleRect.left;
  var end = rect108.left + rect108.width/2 - scaleRect.left;
  var distance = end - start;

  // 105.8 - 104 = 1.8, 108 - 104 = 4, więc 1.8/4 = 0.45 = 45% ODCINKA
  var position = start + (distance * 0.45);

  needle.style.left = position + 'px';
  needleLabel.style.left = position + 'px';
  needle.style.display = 'block';
  needleLabel.style.display = 'block';
}

// Czekam na fonty i na resize
document.fonts.ready.then(setNeedlePosition);
window.addEventListener('resize', setNeedlePosition);

// 2. AUDIO + EQ - Z ZABEZPIECZENIEM PRZED CORS
function initAudio(){
  if(audioCtx) return;
  try {
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyserEnabled = true;
  } catch(e) {
    console.warn('Analyser disabled due to CORS:', e);
    analyserEnabled = false;
  }
}

playBtn.addEventListener('click', function(){
  initAudio();
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  audio.play().catch(function(e){ console.error('Play failed:', e); });
  playBtn.style.boxShadow = '0 0 25px #00ff00, 0 0 45px rgba(0,255,0,0.4)';
  stopBtn.style.boxShadow = '0 0 15px rgba(255,42,42,0.5)';
  setTimeout(function(){
    stopBtn.style.boxShadow = '0 0 15px rgba(255,42,42,0.5)';
  }, 3500);
});

stopBtn.addEventListener('click', function(){
  audio.pause();
  stopBtn.style.boxShadow = '0 0 25px #ff0000, 0 0 45px rgba(255,0,0,0.4)';
  playBtn.style.boxShadow = '0 0 15px rgba(255,42,42,0.5)';
  if(anim) cancelAnimationFrame(anim);
  drawStatic();
});

muteBtn.addEventListener('click', function(){
  audio.muted =!audio.muted;
  muteBtn.style.boxShadow = audio.muted? '0 0 25px #ffaa00, 0 0 45px rgba(255,170,0,0.4)' : '0 0 15px rgba(255,42,42,0.5)';
});

var lastAngle = 0;
var dragging = false;

function updateVol(angle){
  angle = Math.max(-135, Math.min(135, angle));
  lastAngle = angle;
  volIndicator.style.transform = 'translateX(-50%) rotate(' + angle + 'deg)';
  var percent = (angle + 135) / 270;
  audio.volume = percent;
}

function volMove(e){
  if(!dragging) return;
  var rect = volKnob.getBoundingClientRect();
  var cx = rect.left + rect.width/2;
  var cy = rect.top + rect.height/2;
  var x = (e.touches? e.touches[0].clientX : e.clientX) - cx;
  var y = (e.touches? e.touches[0].clientY : e.clientY) - cy;
  var angle = Math.atan2(y, x) * 180 / Math.PI + 90;

  if(angle > 180) angle -= 360;
  if(angle < -180) angle += 360;

  if(lastAngle < -90 && angle > 90) angle = -135;
  if(lastAngle > 90 && angle < -90) angle = 135;

  updateVol(angle);
}

volKnob.addEventListener('mousedown', function(e){ dragging = true; volMove(e); e.preventDefault(); });
volKnob.addEventListener('touchstart', function(e){ dragging = true; volMove(e); e.preventDefault(); });
document.addEventListener('mousemove', volMove);
document.addEventListener('touchmove', volMove, {passive:false});
document.addEventListener('mouseup', function(){ dragging = false; });
document.addEventListener('touchend', function(){ dragging = false; });
updateVol(0);

function drawStatic(){
  canvas.width = canvas.offsetWidth;
  canvas.height = 100;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var bars = 12, barWidth = canvas.width / bars, ledH = 6, ledGap = 2;
  for(var i=0; i<bars; i++){
    for(var j=0; j<10; j++){
      var y = canvas.height - (j+1) * (ledH + ledGap);
      ctx.fillStyle = '#1a0000';
      ctx.fillRect(i*barWidth+2, y, barWidth-4, ledH);
    }
  }
}

function draw(){
  if(!analyserEnabled || audio.paused) {
    if(anim) cancelAnimationFrame(anim);
    drawStatic();
    return;
  }
  anim = requestAnimationFrame(draw);
  canvas.width = canvas.offsetWidth;
  canvas.height = 100;
  analyser.getByteFrequencyData(dataArray);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var bars = 12, barWidth = canvas.width / bars, ledH = 6, ledGap = 2;
  for(var i=0; i<bars; i++){
    var value = (dataArray[i*2] || 0) / 255;
    var leds = Math.floor(value * 10);
    for(var j=0; j<10; j++){
      var y = canvas.height - (j+1) * (ledH + ledGap);
      if(j < leds){
        var g = ctx.createLinearGradient(0, y+ledH, 0, y);
        g.addColorStop(0, '#ff0000');
        g.addColorStop(1, '#ff6666');
        ctx.fillStyle = g;
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ff0000';
      } else {
        ctx.fillStyle = '#1a0000';
        ctx.shadowBlur = 0;
      }
      ctx.fillRect(i*barWidth+2, y, barWidth-4, ledH);
    }
  }
  ctx.shadowBlur = 0;
}

drawStatic();
</script>
</body>
</html>
