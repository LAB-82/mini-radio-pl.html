<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Radio Control</title>
<style>
  /* Styl przycisków z efektem podświetlenia */
  .control-button {
    padding: 10px 20px;
    background-color: #f0f0f0;
    border: none;
    cursor: pointer;
    transition: background-color 0.3s;
    margin: 5px;
    font-size: 16px;
  }
  .control-button:hover {
    background-color: #ddd;
  }

  /* Styl głośnika */
  #speakerIcon {
    font-size: 24px;
    margin: 10px;
  }

  /* Kontener przycisków i fal MUTE */
  #muteControl {
    display: flex;
    align-items: center;
    margin-top: 10px;
  }
  /* Ukrycie fal, gdy mute */
  #radioWaves {
    margin-left: 10px;
    font-size: 24px;
  }
</style>
</head>
<body>

<!-- Pierwsze zdjęcie: kafelek radia -->
<div class="radio-tile">
  <div id="speakerIcon">🔊</div>
  <!-- Inne elementy radia -->
</div>

<!-- Przyciski sterujące -->
<div>
  <button class="control-button" id="playBtn">PLAY</button>
  <button class="control-button" id="stopBtn">STOP</button>
  <div id="muteControl">
    <button class="control-button" id="muteBtn">🔇</button>
    <div id="radioWaves">🌊🌊🌊</div>
  </div>
  <button class="control-button" id="prevBtn">PREV</button>
  <button class="control-button" id="nextBtn">NEXT</button>
</div>

<script>
  // Stan odtwarzania
  let isPlaying = false;
  let isMuted = false;

  const speakerIcon = document.getElementById('speakerIcon');

  // Funkcja do aktualizacji widoczności głośnika
  function updateSpeakerVisibility() {
    if (isPlaying) {
      speakerIcon.style.display = 'block';
    } else {
      speakerIcon.style.display = 'none';
    }
  }

  // Obsługa przycisku PLAY / STOP
  document.getElementById('playBtn').addEventListener('click', () => {
    isPlaying = true;
    updateSpeakerVisibility();
  });

  document.getElementById('stopBtn').addEventListener('click', () => {
    isPlaying = false;
    updateSpeakerVisibility();
  });

  // Obsługa przycisku MUTE
  document.getElementById('muteBtn').addEventListener('click', () => {
    isMuted = !isMuted;
    const icon = document.getElementById('muteBtn');
    const waves = document.getElementById('radioWaves');
    if (isMuted) {
      icon.textContent = '🔈'; // brak fal
      waves.style.display = 'none';
    } else {
      icon.textContent = '🔇'; // fale widoczne
      waves.style.display = 'block';
    }
  });

  // Funkcja do ustawienia podświetlenia przycisków (efekt hover)
  // (CSS obsługuje to automatycznie)

  // Inne przyciski (PREV, NEXT) mogą mieć własne funkcje, jeśli trzeba
  document.getElementById('prevBtn').addEventListener('click', () => {
    // przykładowa funkcja
    alert('Previous track');
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    // przykładowa funkcja
    alert('Next track');
  });

  // Inicjalna widoczność głośnika
  updateSpeakerVisibility();

</script>

</body>
</html>
