<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Radio - RMF FM</title>
<style>
  body {
    background-color: #222;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }
  .radio {
    width: 400px;
    height: 600px;
    background: #333;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .title {
    font-size: 24px;
    margin-bottom: 10px;
    color: yellow; /* kolor tekstu RMF FM */
  }
  /* zamiana czerwonych elementów na żółte */
  .knob, .screen, .buttons button, .volume-slider {
    border: 2px solid yellow;
  }
  /* przyciski sterowania - kolor żółty */
  .buttons button {
    background-color: #555;
    border: 2px solid yellow;
    color: yellow;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
  }
  /* zakres został usunięty */
  /* EQ pozostaje, można go zostawić bez zmian lub usunąć, jeśli jest */
  /* Dodatkowe przyciski pod istniejącymi */
  .extra-buttons {
    display: flex;
    flex-wrap: wrap;
    margin-top: 20px;
    justify-content: center;
  }
  .extra-buttons button {
    background-color: #555;
    border: 2px solid yellow;
    color: yellow;
    padding: 8px 12px;
    margin: 4px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="radio">
  <div class="title">RMF FM</div>
  <!-- symulacja elementów radia -->
  <div class="screen">FM 103.2</div>
  <div class="knob">Głośność</div>
  <div class="eq">
    <div style="margin-top:10px;">EQ</div>
    <!-- tutaj mogą być suwaki lub przyciski -->
  </div>
  <div class="buttons">
    <button id="play">►</button>
    <button id="pause">||</button>
    <button id="stop">■</button>
  </div>
  <!-- element "zakres" usunięty -->
</div>

<!-- Dodatkowe 14 przycisków pod istniejącymi -->
<div class="extra-buttons" id="extra-buttons-container">
  <!-- przyciski zostaną dodane dynamicznie -->
</div>

<script>
  // nazwy kafelków do dodania jako przyciski
  const buttonNames = [
    "Kafelek 1", "Kafelek 2", "Kafelek 3", "Kafelek 4",
    "Kafelek 5", "Kafelek 6", "Kafelek 7", "Kafelek 8",
    "Kafelek 9", "Kafelek 10", "Kafelek 11", "Kafelek 12",
    "Kafelek 13", "Kafelek 14"
  ];

  const container = document.getElementById('extra-buttons-container');

  buttonNames.forEach(name => {
    const btn = document.createElement('button');
    btn.innerText = name;
    // można dodać obsługę kliknięcia, jeśli jest potrzebna
    container.appendChild(btn);
  });
</script>

</body>
</html>
