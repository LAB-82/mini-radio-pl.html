<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini Radio PL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@600;700&display=swap');
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  height: 100%;
  background-color: #fff700;
  overflow: hidden;
}
body {
  font-family: 'Montserrat Alternates', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #000;
  padding: 15px;
  display: flex;
  flex-direction: column;
}
.header {
  text-align: center;
  margin-bottom: 15px;
}
.header h1 {
  font-size: 30px;
  margin-bottom: 4px;
  font-weight: 700;
}
.header p {
  color: #999;
  font-size: 16.25px;
  font-weight: 600;
}
.status {
  background: #FECB00;
  color: #000;
  padding: 12px 2.5cm;
  border-radius: 12px;
  margin-bottom: 15px;
  font-size: 17.5px;
  border: 2px solid #000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 48px;
  font-weight: 700;
}
.status.error {
  background: #e22134;
  color: #fff;
}
.status-text {
  flex: 1;
}
.clock {
  font-variant-numeric: tabular-nums;
  min-width: 60px;
  text-align: right;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
  flex: 1;
  min-height: 0;
  margin-bottom: 15px;
}
.tile {
  background: #FECB00;
  border: 2px solid #000;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
  color: #000;
  position: relative;
  height: 100px;
}
.tile:hover {
  background: #FFD633;
}
.tile:active {
  transform: scale(0.96);
}
.tile.active {
  background: #FECB00;
  border-color: #000;
  color: #000;
}
/* Styl dla kontenera sterowania */
.control-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
/* Przyciski typu Winamp z ikonami dźwięku */
.control-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 24px;
  padding: 8px;
  border-radius: 50%;
  transition: background 0.2s;
}
.control-btn:hover {
  background: rgba(0,0,0,0.1);
}
.control-btn:focus {
  outline: none;
}
/* Przycisk w stylu Winamp - z ikoną głośnika, wyciszenia itd. */
#volumeIcon {
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: background 0.2s;
}
#volumeIcon:hover {
  background: rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<div class="header">
  <h1>Mini Radio PL</h1>
  <p>RMF RMF • Tylko najlepsze stacje</p>
</div>

<div class="status" id="status">
  <span class="status-text" id="statusText"></span>
  <span class="clock" id="clock">00:00:00</span>
</div>

<div class="grid" id="grid"></div>

<div class="controls" id="playerControls">
  <button class="btn" id="playBtn" disabled>PLAY</button>
  <button class="btn" id="stopBtn" disabled>STOP</button>
  <button class="btn" id="prevBtn" disabled>PREV</button>
  <button class="btn" id="nextBtn" disabled>NEXT</button>
  <button class="btn" id="muteBtn">🔊</button>
  <div class="control-wrapper">
    <!-- Ikona głośnika, wyciszenia itp. -->
    <div id="volumeIcon" title="Wycisz / Włącz dźwięk">🔊</div>
    <!-- Suwak głośności -->
    <input type="range" id="volume" min="0" max="100" value="80" />
  </div>
</div>

<!-- Nowe przyciski w stylu Winamp -->
<div class="control-wrapper" style="margin-top: 20px;">
  <button id="btnPrev" class="control-btn" title="Poprzednia">⏮️</button>
  <button id="btnStop" class="control-btn" title="Stop">⏹️</button>
  <button id="btnPlayPause" class="control-btn" title="Play/Pause">▶️</button>
  <button id="btnNext" class="control-btn" title="Następna">⏭️</button>
  <button id="btnMute" class="control-btn" title="Wycisz">🔇</button>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
// Lista stacji
const STATIONS = [
  { name: 'RMF FM', url: 'https://rs201-krk.rmfstream.pl/rmf_fm' },
  { name: 'RMF MAXX', url: 'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' },
  { name: 'RMF 80s', url: 'https://rs201-krk.rmfstream.pl/rmf_80s' },
  { name: 'RMF 90s', url: 'https://rs201-krk.rmfstream.pl/rmf_90s' },
  { name: 'RMF 2000', url: 'https://rs201-krk.rmfstream.pl/rmf_2000' },
  { name: 'RMF Chillout', url: 'https://rs201-krk.rmfstream.pl/rmf_chillout' },
  { name: 'RMF Classic', url: 'https://rs201-krk.rmfstream.pl/rmf_classic' },
  { name: 'RMF Dance', url: 'https://rs201-krk.rmfstream.pl/rmf_dance' },
  { name: 'RMF Gold', url: 'https://rs201-krk.rmfstream.pl/rmf_gold' },
  { name: 'RMF Latino', url: 'https://rs201-krk.rmfstream.pl/rmf_latino' },
  { name: 'RMF Love', url: 'https://rs201-krk.rmfstream.pl/rmf_love' },
  { name: 'RMF Party', url: 'https://rs201-krk.rmfstream.pl/rmf_party' },
  { name: 'RMF Polski Rock', url: 'https://rs201-krk.rmfstream.pl/rmf_polski_rock' },
  { name: 'RMF Rock', url: 'https://rs201-krk.rmfstream.pl/rmf_rock' }
];

const player = document.getElementById('player');
const grid = document.getElementById('grid');
const status = document.getElementById('status');
const statusText = document.getElementById('statusText');
const clock = document.getElementById('clock');
const playBtn = document.getElementById('playBtn');
const stopBtn = document.getElementById('stopBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const volume = document.getElementById('volume');
const muteBtn = document.getElementById('muteBtn');

const btnPrev = document.getElementById('btnPrev');
const btnStop = document.getElementById('btnStop');
const btnPlayPause = document.getElementById('btnPlayPause');
const btnNext = document.getElementById('btnNext');
const btnMute = document.getElementById('btnMute');

let currentIndex = -1;
let lastVolume = 0.8;
let isPlaying = false;
let isMuted = false;

player.volume = 0.8;

function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  const s = now.getSeconds().toString().padStart(2, '0');
  clock.textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

STATIONS.forEach((st, i) => {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.innerHTML = `<div class="name">${st.name}</div>`;
  const icon = document.createElement('div');
  icon.className = 'głośnik';
  icon.innerHTML = '🔊';
  tile.appendChild(icon);
  tile.onclick = () => playStation(i);
  grid.appendChild(tile);
});

function updateTileActive() {
  document.querySelectorAll('.tile').forEach((t, i) => {
    t.classList.toggle('active', i === currentIndex);
    const głośnik = t.querySelector('.głośnik');
    if (głośnik) {
      głośnik.style.display = (i === currentIndex && isPlaying) ? 'block' : 'none';
      głośnik.classList.toggle('przekreslony', !(i === currentIndex && isPlaying));
    }
  });
}

function playStation(index) {
  const st = STATIONS[index];
  player.pause();
  currentIndex = index;
  updateTileActive();
  statusText.textContent = 'Ładowanie: ' + st.name;
  status.classList.remove('error');
  isPlaying = false;
  player.src = st.url;
  player.play().then(() => {
    statusText.textContent = 'Gra: ' + st.name;
    [playBtn, stopBtn, prevBtn, nextBtn].forEach(b => b.disabled = false);
    isPlaying = true;
    updateTileActive();
  }).catch(err => {
    statusText.textContent = 'Błąd: ' + st.name;
    status.classList.add('error');
    currentIndex = -1;
    isPlaying = false;
    updateTileActive();
    [playBtn, stopBtn].forEach(b => b.disabled = true);
    playBtn.classList.remove('active');
  });
}

// Przyciski z UI (stare)
playBtn.onclick = () => {
  if (currentIndex === -1) return;
  if (player.paused) {
    player.play();
    playBtn.classList.add('active');
    statusText.textContent = 'Teraz słuchasz: ' + STATIONS[currentIndex].name;
  } else {
    player.pause();
    playBtn.classList.remove('active');
    statusText.textContent = 'Zatrzymane: ' + STATIONS[currentIndex].name;
  }
  updateTileActive();
};
stopBtn.onclick = () => {
  player.pause();
  player.currentTime = 0;
  playBtn.classList.remove('active');
  if (currentIndex !== -1) {
    statusText.textContent = 'Zatrzymane: ' + STATIONS[currentIndex].name;
  }
  updateTileActive();
};
prevBtn.onclick = () => {
  if (currentIndex > 0) playStation(currentIndex - 1);
};
nextBtn.onclick = () => {
  if (currentIndex < STATIONS.length - 1) playStation(currentIndex + 1);
};

// Głośność i ikona głośnika
volume.oninput = (e) => {
  const vol = e.target.value / 100;
  player.volume = vol;
  if (vol === 0) {
    isMuted = true;
  } else {
    isMuted = false;
  }
  updateMuteIcon();
};

function updateMuteIcon() {
  if (isMuted || player.volume === 0) {
    document.getElementById('volumeIcon').innerHTML = '🔇';
  } else {
    document.getElementById('volumeIcon').innerHTML = '🔊';
  }
}

// Klikanie ikony głośnika
document.getElementById('volumeIcon').onclick = () => {
  if (!isMuted && player.volume > 0) {
    lastVolume = player.volume;
    player.volume = 0;
    isMuted = true;
  } else {
    player.volume = lastVolume || 0.8;
    isMuted = false;
  }
  volume.value = player.volume * 100;
  updateMuteIcon();
};

// Nowe przyciski Winamp (sterowanie)
document.getElementById('btnPrev').onclick = () => {
  if (currentIndex > 0) playStation(currentIndex - 1);
};
document.getElementById('btnStop').onclick = () => {
  player.pause();
  player.currentTime = 0;
  // Aktualizacja UI
};
document.getElementById('btnPlayPause').onclick = () => {
  if (currentIndex === -1) return;
  if (player.paused) {
    player.play();
  } else {
    player.pause();
  }
};
document.getElementById('btnNext').onclick = () => {
  if (currentIndex < STATIONS.length - 1) playStation(currentIndex + 1);
};
document.getElementById('btnMute').onclick = () => {
  if (!isMuted && player.volume > 0) {
    lastVolume = player.volume;
    player.volume = 0;
    isMuted = true;
  } else {
    player.volume = lastVolume || 0.8;
    isMuted = false;
  }
  volume.value = player.volume * 100;
  updateMuteIcon();
};
</script>
</body>
</html>
