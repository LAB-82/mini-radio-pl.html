<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Radio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Montserrat Alternates',sans-serif;
background:#FFF4B5;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
height:100vh;
}

/* STATUS */
.status{
background:#FECB00;
border:2px solid #000;
border-radius:16px;
padding:12px;
display:flex;
justify-content:space-between;
font-weight:700;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

/* PANEL */
.panel{
background:#0d0d0d;
border-radius:18px;
padding:12px;
box-shadow:0 10px 25px rgba(0,0,0,.6), inset 0 0 40px rgba(255,200,0,.15);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
overflow:auto;
}

/* TILE */
.tile{
background:#FECB00;
border-radius:12px;
border:2px solid #000;
padding:12px;
text-align:center;
cursor:pointer;
font-weight:700;
transition:.2s;
}

.tile:hover{background:#FFD633;}

.tile.active{
background:#111;
border-color:#FFD700;
box-shadow:0 0 12px #FFD700, inset 0 0 10px rgba(255,215,0,.5);
}

.tile span{color:#000;}
.tile.active span{
color:#FFFACD;
text-shadow:0 0 10px #FFD700,0 0 25px #FFA500;
}

/* LOGO */
.logo-box{
background:#0d0d0d;
border-radius:18px;
padding:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.6), inset 0 0 40px rgba(255,200,0,.2);
}

.logo{
font-size:8vh;
color:#FFD700;
font-weight:700;
text-shadow:0 0 15px #FFD700,0 0 40px #FFA500;
-webkit-text-stroke:2px #000;
}

/* CONTROLS */
.controls{
background:#FECB00;
border-radius:16px;
border:2px solid #000;
padding:10px;
display:flex;
gap:8px;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.ctrl-btn{
background:#111;
border:2px solid #FFD700;
color:#FFD700;
border-radius:8px;
padding:8px 12px;
cursor:pointer;
font-weight:700;
}

.ctrl-btn:disabled{
opacity:.4;
cursor:not-allowed;
}

.ctrl-btn.play.active{
background:#FECB00;
color:#000;
}

input[type="range"]{
flex:1;
height:6px;
background:#111;
border:1px solid #FFD700;
border-radius:5px;
}

input[type="range"]::-webkit-slider-thumb{
appearance:none;
width:14px;
height:14px;
background:#FFD700;
border-radius:50%;
}

/* MOBILE */
@media(max-width:850px){
.grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<div class="status">
<span id="statusText">Wybierz stację</span>
<span id="clock"></span>
</div>

<div class="panel">
<div class="grid" id="grid"></div>
</div>

<div class="logo-box">
<div class="logo">RMF FM</div>
</div>

<div class="controls">
<button class="ctrl-btn play" id="playBtn" disabled>PLAY</button>
<button class="ctrl-btn" id="stopBtn" disabled>STOP</button>
<button class="ctrl-btn" id="prevBtn" disabled>PREV</button>
<button class="ctrl-btn" id="nextBtn" disabled>NEXT</button>
<input type="range" id="volume" min="0" max="100" value="80">
<button class="ctrl-btn" id="muteBtn">MUTE</button>
</div>

<audio id="player"></audio>

<script>
const STATIONS=[
{ name:'RMF FM', url:'https://rs201-krk.rmfstream.pl/rmf_fm' },
{ name:'RMF Maxx', url:'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' },
{ name:'RMF 80s', url:'https://rs201-krk.rmfstream.pl/rmf_80s' },
{ name:'RMF 90s', url:'https://rs201-krk.rmfstream.pl/rmf_90s' },
{ name:'RMF 2000', url:'https://rs201-krk.rmfstream.pl/rmf_2000' },
{ name:'Chillout', url:'https://rs201-krk.rmfstream.pl/rmf_chillout' },
{ name:'Classic', url:'https://rs201-krk.rmfstream.pl/rmf_classic' },
{ name:'Dance', url:'https://rs201-krk.rmfstream.pl/rmf_dance' },
{ name:'Gold', url:'https://rs201-krk.rmfstream.pl/rmf_gold' },
{ name:'Latino', url:'https://rs201-krk.rmfstream.pl/rmf_latino' },
{ name:'Love', url:'https://rs201-krk.rmfstream.pl/rmf_love' },
{ name:'Party', url:'https://rs201-krk.rmfstream.pl/rmf_party' },
{ name:'Polski Rock', url:'https://rs201-krk.rmfstream.pl/rmf_polski_rock' },
{ name:'Rock', url:'https://rs201-krk.rmfstream.pl/rmf_rock' },
{ name:'Smooth Jazz', url:'https://rs201-krk.rmfstream.pl/rmf_smooth_jazz' }
];

const player=document.getElementById('player');
const grid=document.getElementById('grid');
const statusText=document.getElementById('statusText');

const playBtn=document.getElementById('playBtn');
const stopBtn=document.getElementById('stopBtn');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const volume=document.getElementById('volume');
const muteBtn=document.getElementById('muteBtn');

let currentIndex=-1;
player.volume=0.8;

/* GRID */
STATIONS.forEach((s,i)=>{
let el=document.createElement('div');
el.className='tile';
el.innerHTML=`<span>${s.name}</span>`;
el.onclick=()=>playStation(i);
grid.appendChild(el);
});

function updateTiles(){
document.querySelectorAll('.tile').forEach((t,i)=>{
t.classList.toggle('active',i===currentIndex);
});
}

function playStation(i){
const st=STATIONS[i];
player.pause();
currentIndex=i;
player.src=st.url;

statusText.textContent="Ładowanie: "+st.name;

player.play().then(()=>{
statusText.textContent="Gra: "+st.name;
playBtn.classList.add('active');
[playBtn,stopBtn,prevBtn,nextBtn].forEach(b=>b.disabled=false);
}).catch(()=>{
statusText.textContent="Błąd";
});

updateTiles();
}

/* BUTTONS */
playBtn.onclick=()=>{
if(currentIndex===-1)return;

if(player.paused){
player.play();
playBtn.classList.add('active');
}else{
player.pause();
playBtn.classList.remove('active');
}
};

stopBtn.onclick=()=>{
player.pause();
player.currentTime=0;
playBtn.classList.remove('active');
};

prevBtn.onclick=()=>{
if(currentIndex>0)playStation(currentIndex-1);
};

nextBtn.onclick=()=>{
if(currentIndex<STATIONS.length-1)playStation(currentIndex+1);
};

volume.oninput=e=>{
player.volume=e.target.value/100;
};

muteBtn.onclick=()=>{
player.muted=!player.muted;
};

/* CLOCK */
setInterval(()=>{
clock.textContent=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
