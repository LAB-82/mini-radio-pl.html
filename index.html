<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Radio - RMF FM</title>
<style>
  /* Twój styl, który już miałeś, z zamianą czerwonych elementów na żółte */
  /* Dodajemy tylko niezbędne style do przycisków */
  #station-buttons {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }
  #station-buttons button {
    margin: 4px;
    padding: 8px 12px;
    background-color: #555;
    border: 2px solid yellow;
    color: yellow;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
  }
</style>
</head>
<body>

<!-- Twój kod radia z pierwszego kodu - przykładowe elementy -->
<div id="radio-container">
  <!-- tutaj umieścisz swój kod radia, np. ekran, przyciski, etc. -->
  <!-- Przykład: -->
  <div id="radio-screen">FM 103.2</div>
  <!-- Przycisk odtwarzania -->
  <button id="play">►</button>
</div>

<!-- Dodajemy 14 przycisków pod radiem -->
<div id="station-buttons"></div>

<script>
  // Przypisanie stacji radiowych do przycisków
  const stations = [
    { name: "Stacja 1", frequency: "FM 103.2" },
    { name: "Stacja 2", frequency: "FM 99.5" },
    { name: "Stacja 3", frequency: "FM 105.8" },
    { name: "Stacja 4", frequency: "FM 88.0" },
    { name: "Stacja 5", frequency: "FM 97.2" },
    { name: "Stacja 6", frequency: "FM 101.1" },
    { name: "Stacja 7", frequency: "FM 107.0" },
    { name: "Stacja 8", frequency: "FM 102.4" },
    { name: "Stacja 9", frequency: "FM 94.7" },
    { name: "Stacja 10", frequency: "FM 90.3" },
    { name: "Stacja 11", frequency: "FM 98.1" },
    { name: "Stacja 12", frequency: "FM 104.5" },
    { name: "Stacja 13", frequency: "FM 96.7" },
    { name: "Stacja 14", frequency: "FM 100.0" }
  ];

  const container = document.getElementById('station-buttons');

  stations.forEach((station, index) => {
    const btn = document.createElement('button');
    btn.innerText = station.name;
    btn.addEventListener('click', () => {
      // tutaj ustawiasz odtwarzanie stacji, np. zmiana tekstu na ekranie
      document.getElementById('radio-screen').innerText = station.frequency;
      // jeśli masz odtwarzacz audio, ustaw jego źródło na odpowiedni stream
      // np. audio.src = station.streamUrl;
    });
    container.appendChild(btn);
  });
</script>

</body>
</html>
