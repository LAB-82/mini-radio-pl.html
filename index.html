<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Radio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Montserrat Alternates',sans-serif;
background:#FFF4B5;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
height:100vh;
}

/* STATUS */
.status{
background:#FECB00;
border:2px solid #000;
border-radius:16px;
padding:12px;
display:flex;
justify-content:space-between;
font-weight:700;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

/* GRID WRAPPER (CZARNY PANEL!) */
.panel{
background:#0d0d0d;
border-radius:18px;
padding:12px;
box-shadow:
0 10px 25px rgba(0,0,0,.6),
inset 0 0 40px rgba(255,200,0,.15);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

/* TILE */
.tile{
background:#FECB00;
border-radius:12px;
border:2px solid #000;
padding:12px;
text-align:center;
cursor:pointer;
transition:.2s;
font-weight:700;
}

.tile:hover{
background:#FFD633;
}

.tile.active{
background:#111;
border-color:#FFD700;
box-shadow:
0 0 10px #FFD700,
0 0 25px #FFD700,
inset 0 0 10px rgba(255,215,0,.5);
}

/* TEXT */
.tile span{
color:#000;
}

.tile.active span{
color:#FFFACD;
text-shadow:
0 0 5px #FFD700,
0 0 15px #FFA500,
0 0 30px #FF8C00;
}

/* LOGO PANEL */
.logo-box{
background:#0d0d0d;
border-radius:18px;
padding:20px;
text-align:center;
box-shadow:
0 10px 25px rgba(0,0,0,.6),
inset 0 0 40px rgba(255,200,0,.2);
}

.logo{
font-size:8vh;
color:#FFD700;
font-weight:700;
text-shadow:
0 0 10px #FFD700,
0 0 30px #FFA500,
0 0 60px #FF8C00;
-webkit-text-stroke:2px #000;
}

/* CONTROLS */
.controls{
background:#FECB00;
border-radius:16px;
border:2px solid #000;
padding:10px;
display:flex;
gap:8px;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

/* BUTTON */
.ctrl-btn{
background:#111;
border:2px solid #FFD700;
color:#FFD700;
border-radius:8px;
padding:8px 12px;
cursor:pointer;
font-weight:700;
}

.ctrl-btn:hover{
box-shadow:0 0 10px #FFD700;
}

.ctrl-btn.play.active{
background:#FECB00;
color:#000;
}

/* SLIDER */
input[type="range"]{
flex:1;
height:6px;
background:#111;
border:1px solid #FFD700;
border-radius:5px;
}

input[type="range"]::-webkit-slider-thumb{
appearance:none;
width:14px;
height:14px;
background:#FFD700;
border-radius:50%;
box-shadow:0 0 6px #FFD700;
}

/* MOBILE */
@media(max-width:850px){
.grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<div class="status">
<span id="statusText">Wybierz stację</span>
<span id="clock"></span>
</div>

<div class="panel">
<div class="grid" id="grid"></div>
</div>

<div class="logo-box">
<div class="logo">RMF FM</div>
</div>

<div class="controls">
<button class="ctrl-btn play" id="playBtn" disabled>PLAY</button>
<button class="ctrl-btn" id="stopBtn" disabled>STOP</button>
<button class="ctrl-btn" id="prevBtn">PREV</button>
<button class="ctrl-btn" id="nextBtn">NEXT</button>
<input type="range" id="volume" min="0" max="100" value="80">
<button class="ctrl-btn" id="muteBtn">MUTE</button>
</div>

<audio id="player"></audio>

<script>
const STATIONS=[
{ name:'RMF FM', url:'https://rs201-krk.rmfstream.pl/rmf_fm' },
{ name:'RMF Maxx', url:'https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48' },
{ name:'RMF 80s', url:'https://rs201-krk.rmfstream.pl/rmf_80s' },
{ name:'RMF 90s', url:'https://rs201-krk.rmfstream.pl/rmf_90s' },
{ name:'RMF 2000', url:'https://rs201-krk.rmfstream.pl/rmf_2000' }
];

const grid=document.getElementById('grid');
const player=document.getElementById('player');
const statusText=document.getElementById('statusText');

let current=-1;

STATIONS.forEach((s,i)=>{
let el=document.createElement('div');
el.className='tile';
el.innerHTML=`<span>${s.name}</span>`;
el.onclick=()=>play(i);
grid.appendChild(el);
});

function play(i){
current=i;
player.src=STATIONS[i].url;
player.play();
statusText.textContent="Gra: "+STATIONS[i].name;
update();
}

function update(){
document.querySelectorAll('.tile').forEach((t,i)=>{
t.classList.toggle('active',i===current);
});
}

playBtn.onclick=()=>{
if(player.paused){player.play();}
else{player.pause();}
};

stopBtn.onclick=()=>player.pause();

prevBtn.onclick=()=>{if(current>0)play(current-1);};
nextBtn.onclick=()=>{if(current<STATIONS.length-1)play(current+1);};

volume.oninput=e=>player.volume=e.target.value/100;

muteBtn.onclick=()=>player.muted=!player.muted;

/* CLOCK */
setInterval(()=>{
clock.textContent=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
