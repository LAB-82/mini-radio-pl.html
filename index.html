<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Radio z 14 stacjami</title>
<style>
  body {
    background-color: #222;
    color: yellow;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  #radio {
    width: 600px;
    background-color: #333;
    border: 3px solid yellow;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 0 20px #000;
    position: relative;
  }
  /* ekran */
  #display {
    width: 100%;
    height: 40px;
    background-color: black;
    color: yellow;
    font-size: 20px;
    text-align: center;
    line-height: 40px;
    margin-bottom: 10px;
    border-radius: 5px;
  }
  /* equalizer */
  #equalizer {
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    height: 60px;
    margin-bottom: 10px;
  }
  .bar {
    width: 10px;
    background-color: yellow;
    height: 20px;
    animation: move 1s infinite;
  }
  @keyframes move {
    0% { height: 20px; }
    50% { height: 50px; }
    100% { height: 20px; }
  }
  /* przyciski główne */
  #controls {
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
  }
  #controls button {
    padding: 8px 12px;
    background-color: #555;
    border: 2px solid yellow;
    color: yellow;
    border-radius: 5px;
    cursor: pointer;
  }
  /* głośnik i regulacja głośności */
  #speaker {
    width: 100px;
    height: 100px;
    background-color: #555;
    border-radius: 50%;
    margin: 10px auto;
    position: relative;
  }
  #speaker:after {
    content: "";
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60%;
    height: 20%;
    background: yellow;
    border-radius: 10px;
  }
  #volume {
    width: 200px;
  }
  /* przyciski stacji */
  #station-buttons {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }
  #station-buttons button {
    margin: 4px;
    padding: 8px 10px;
    background-color: #555;
    border: 2px solid yellow;
    color: yellow;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="radio">
  <div id="display">FM 103.2</div>
  <!-- Equalizer -->
  <div id="equalizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
  <!-- Kontrolki -->
  <div id="controls">
    <button id="power">ON</button>
    <button id="stop">STOP</button>
    <button id="mute">MUTE</button>
    <button id="off">OFF</button>
  </div>
  <!-- Głośnik -->
  <div id="speaker"></div>
  <!-- Regulacja głośności -->
  <div>
    <input type="range" id="volume" min="0" max="100" value="50" />
  </div>
</div>

<!-- Przyciski stacji -->
<div id="station-buttons"></div>

<script>
  const display = document.getElementById('display');
  const powerBtn = document.getElementById('power');
  const stopBtn = document.getElementById('stop');
  const muteBtn = document.getElementById('mute');
  const offBtn = document.getElementById('off');
  const volumeRange = document.getElementById('volume');

  let isOn = false;
  let isMuted = false;

  // Przypisanie stacji
  const stations = [
    { name: "Stacja 1", frequency: "FM 103.2" },
    { name: "Stacja 2", frequency: "FM 99.5" },
    { name: "Stacja 3", frequency: "FM 105.8" },
    { name: "Stacja 4", frequency: "FM 88.0" },
    { name: "Stacja 5", frequency: "FM 97.2" },
    { name: "Stacja 6", frequency: "FM 101.1" },
    { name: "Stacja 7", frequency: "FM 107.0" },
    { name: "Stacja 8", frequency: "FM 102.4" },
    { name: "Stacja 9", frequency: "FM 94.7" },
    { name: "Stacja 10", frequency: "FM 90.3" },
    { name: "Stacja 11", frequency: "FM 98.1" },
    { name: "Stacja 12", frequency: "FM 104.5" },
    { name: "Stacja 13", frequency: "FM 96.7" },
    { name: "Stacja 14", frequency: "FM 100.0" }
  ];

  // Tworzymy przyciski stacji
  const btnContainer = document.getElementById('station-buttons');
  stations.forEach((station, index) => {
    const btn = document.createElement('button');
    btn.innerText = station.name;
    btn.addEventListener('click', () => {
      if (isOn) {
        display.innerText = station.frequency;
      }
    });
    btnContainer.appendChild(btn);
  });

  // Funkcje obsługi przycisków
  powerBtn.onclick = () => {
    isOn = true;
    display.innerText = "FM 103.2";
  };

  offBtn.onclick = () => {
    isOn = false;
    display.innerText = "";
  };

  muteBtn.onclick = () => {
    isMuted = !isMuted;
    if (isMuted) {
      display.innerText = "MUTE";
    } else {
      // przywróć ostatnią stację
      display.innerText = "FM 103.2";
    }
  };

  stopBtn.onclick = () => {
    display.innerText = "";
  };

  volumeRange.oninput = () => {
    // można dodać funkcję zmiany głośności
    // na razie to jest tylko wizualne
  };
</script>

</body>
</html>
